name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    # Placeholder env vars for build + test steps.
    # These are NOT real secrets — they satisfy Zod schema validation so
    # the Next.js build and Vitest suite complete in CI without live credentials.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
      NEXTAUTH_SECRET: ci-nextauth-secret-32-chars-placeholder
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      STRIPE_SECRET_KEY: sk_test_ci_placeholder_key
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_secret
      STRIPE_PRICE_ID_PRO: price_ci_pro_placeholder
      STRIPE_PRICE_ID_ENTERPRISE: price_ci_enterprise_placeholder
      P402_SIGNER_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      # Hardhat account #0 — well-known public test key, safe for CI
      P402_FACILITATOR_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Build SDK
      run: cd sdk && npx tsc && cd ..

    - name: Build
      run: npm run build --if-present

    - name: Run Tests
      run: npm run test:run
